{% extends 'layouts/base.html' %}

{% block title %}Edit {{ phase.name }} - Idea Management{% endblock %}

{% block content %}
<div class="container mx-auto max-w-2xl">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Edit Phase</h1>
        
        <form method="POST" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" name="name" id="name" value="{{ phase.name }}" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea name="description" id="description" rows="4" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">{{ phase.description }}</textarea>
            </div>

            <div>
                <label for="order" class="block text-sm font-medium text-gray-700">Order</label>
                <input type="number" name="order" id="order" value="{{ phase.order }}" min="1" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                <p class="mt-1 text-sm text-gray-500">The order in which this phase should appear (1 being first)</p>
            </div>

            <div>
                <label for="requirements" class="block text-sm font-medium text-gray-700">Requirements</label>
                <select name="requirements" id="requirements" multiple
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    {% for requirement in requirements %}
                    <option value="{{ requirement.id }}" {% if requirement in phase.requirements %}selected{% endif %}>
                        {{ requirement.name }}
                    </option>
                    {% endfor %}
                </select>
                <p class="mt-1 text-sm text-gray-500">Hold Ctrl/Cmd to select multiple requirements</p>
            </div>

            <div class="flex justify-end space-x-4">
                <a href="{{ url_for('phases_show', id=phase.id) }}" 
                    class="bg-gray-100 text-gray-700 hover:bg-gray-200 px-4 py-2 rounded">
                    Cancel
                </a>
                <button type="submit" 
                    class="bg-blue-500 text-white hover:bg-blue-600 px-4 py-2 rounded">
                    Update Phase
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
