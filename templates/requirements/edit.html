{% extends 'layouts/base.html' %}

{% block title %}Edit Requirement - {{ requirement.name }} - Idea Management{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-lg shadow-md p-6">
            <h1 class="text-2xl font-bold text-gray-900 mb-6">Edit Requirement</h1>
            
            <form method="POST" class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                    <input type="text" name="name" id="name" required
                           value="{{ requirement.name }}"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
                
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea name="description" id="description" rows="4" required
                              class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">{{ requirement.description }}</textarea>
                </div>
                
                <div>
                    <label for="requirement_type_id" class="block text-sm font-medium text-gray-700">Type</label>
                    <select name="requirement_type_id" id="requirement_type_id" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        {% for type in requirement_types %}
                        <option value="{{ type.id }}" {% if requirement.type_id == type.id %}selected{% endif %}>
                            {{ type.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label for="status_id" class="block text-sm font-medium text-gray-700">Status</label>
                    <select name="status_id" id="status_id" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        {% for status in statuses %}
                        <option value="{{ status.id }}" {% if requirement.status_id == status.id %}selected{% endif %}>
                            {{ status.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="flex justify-end space-x-3">
                    <a href="{{ url_for('evolution_phases_show', 
                                      idea_id=requirement.idea_evolution_phase.idea_evolution_cycle.idea.id,
                                      evolution_id=requirement.idea_evolution_phase.idea_evolution_cycle.evolution_cycle.id,
                                      phase_id=requirement.idea_evolution_phase.phase.id) }}"
                       class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200">
                        Cancel
                    </a>
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
