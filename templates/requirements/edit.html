{% extends 'layouts/base.html' %}

{% block title %}Edit {{ requirement.name }} - Idea Management{% endblock %}

{% block content %}
<div class="container mx-auto max-w-2xl">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Edit Requirement</h1>
        
        <form method="POST" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" name="name" id="name" value="{{ requirement.name }}" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea name="description" id="description" rows="4" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">{{ requirement.description }}</textarea>
            </div>

            <div>
                <label for="types" class="block text-sm font-medium text-gray-700">Requirement Types</label>
                <select name="types" id="types" multiple
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    {% for type in types %}
                    <option value="{{ type.id }}" {% if type in requirement.types %}selected{% endif %}>
                        {{ type.name }}
                    </option>
                    {% endfor %}
                </select>
                <p class="mt-1 text-sm text-gray-500">Hold Ctrl/Cmd to select multiple types</p>
            </div>

            <div>
                <label for="priority_id" class="block text-sm font-medium text-gray-700">Priority</label>
                <select name="priority_id" id="priority_id" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    <option value="">Select a priority</option>
                    {% for priority in priorities %}
                    <option value="{{ priority.id }}" {% if requirement.priority and requirement.priority.id == priority.id %}selected{% endif %}>
                        {{ priority.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex justify-end space-x-4">
                <a href="{{ url_for('requirements_show', id=requirement.id) }}" 
                    class="bg-gray-100 text-gray-700 hover:bg-gray-200 px-4 py-2 rounded">
                    Cancel
                </a>
                <button type="submit" 
                    class="bg-blue-500 text-white hover:bg-blue-600 px-4 py-2 rounded">
                    Update Requirement
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
