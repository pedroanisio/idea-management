{% extends 'layouts/base.html' %}

{% block title %}Create Requirement{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
            <h1 class="text-2xl font-bold mb-6">Create Requirement</h1>
            
            <div class="mb-6 bg-gray-50 p-4 rounded">
                <h2 class="text-lg font-semibold mb-2">Context</h2>
                <p class="text-gray-700">
                    <span class="font-medium">Idea:</span> {{ phase_details.idea_name }}<br>
                    <span class="font-medium">Evolution Cycle:</span> {{ phase_details.evolution_name }}<br>
                    <span class="font-medium">Phase:</span> {{ phase_details.phase_name }}
                </p>
            </div>

            <form method="POST" action="{{ url_for('requirements_create') }}" class="space-y-4">
                <div>
                    <label for="name" class="block text-gray-700 text-sm font-bold mb-2">Name</label>
                    <input type="text" name="name" id="name" required
                           class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>

                <div>
                    <label for="description" class="block text-gray-700 text-sm font-bold mb-2">Description</label>
                    <textarea name="description" id="description" required rows="4"
                              class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"></textarea>
                </div>

                <div>
                    <label for="type_id" class="block text-gray-700 text-sm font-bold mb-2">Type</label>
                    <select name="type_id" id="type_id" required
                            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                        <option value="">Select a type...</option>
                        {% for type in requirement_types %}
                        <option value="{{ type.id }}">{{ type.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="priority_id" class="block text-gray-700 text-sm font-bold mb-2">Priority</label>
                    <select name="priority_id" id="priority_id"
                            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                        <option value="">Select a priority...</option>
                        {% for priority in priorities %}
                        <option value="{{ priority.id }}">{{ priority.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="flex items-center justify-between mt-6">
                    <button type="submit"
                            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                        Create Requirement
                    </button>
                    <a href="{{ url_for('ideas_show', id=phase_details.IdeaEvolutionPhase.idea_evolution_cycle.idea_id) }}"
                       class="text-blue-500 hover:text-blue-800">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
