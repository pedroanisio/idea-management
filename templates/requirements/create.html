{% extends 'layouts/base.html' %}

{% block title %}New Requirement - Idea Management{% endblock %}

{% block content %}
<div class="container mx-auto max-w-2xl">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">New Requirement</h1>
        
        <form method="POST" action="{{ url_for('requirements_create') }}" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" name="name" id="name" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea name="description" id="description" rows="4" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"></textarea>
            </div>

            <div>
                <label for="idea_evolution_phase_id" class="block text-sm font-medium text-gray-700">Phase</label>
                <select name="idea_evolution_phase_id" id="idea_evolution_phase_id" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    <option value="">Select a phase...</option>
                    {% for idea_phase in idea_evolution_phases %}
                    <option value="{{ idea_phase[0].id }}">
                        {{ idea_phase.idea_name }} - {{ idea_phase.cycle_name }} - {{ idea_phase.phase_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="type_id" class="block text-sm font-medium text-gray-700">Type</label>
                <select name="type_id" id="type_id"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    <option value="">Select a type...</option>
                    {% for type in types %}
                    <option value="{{ type.id }}">{{ type.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="priority_id" class="block text-sm font-medium text-gray-700">Priority</label>
                <select name="priority_id" id="priority_id"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    <option value="">Select a priority...</option>
                    {% for priority in priorities %}
                    <option value="{{ priority.id }}">{{ priority.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex justify-end space-x-4">
                <a href="{{ url_for('requirements') }}" 
                    class="bg-gray-100 text-gray-700 hover:bg-gray-200 px-4 py-2 rounded">
                    Cancel
                </a>
                <button type="submit" 
                    class="bg-blue-500 text-white hover:bg-blue-600 px-4 py-2 rounded">
                    Create Requirement
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
