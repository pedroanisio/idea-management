{% extends 'layouts/base.html' %}

{% block title %}Edit Technology - Idea Management{% endblock %}

{% block content %}
<div class="container mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Edit Technology</h1>
        <a href="{{ url_for('technologies') }}" class="text-blue-500 hover:text-blue-600">← Back to Technologies</a>
    </div>

    <form method="POST" class="bg-white rounded-lg shadow-md p-6">
        <div class="mb-4">
            <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Name</label>
            <input type="text" name="name" id="name" value="{{ technology.name }}" required
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-4">
            <label for="type_id" class="block text-sm font-medium text-gray-700 mb-2">Type</label>
            <select name="type_id" id="type_id" required
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Select a type</option>
                {% for type in technology_types %}
                <option value="{{ type.id }}" {% if technology.type_id == type.id %}selected{% endif %}>
                    {{ type.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-4">
            <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Description</label>
            <textarea name="description" id="description" rows="4"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">{{ technology.description }}</textarea>
        </div>

        <div class="flex justify-end">
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded">
                Update Technology
            </button>
        </div>
    </form>
</div>
{% endblock %}
