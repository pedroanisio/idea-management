{% extends 'layouts/base.html' %}

{% block title %}Add Version - {{ technology.name }} - Idea Management{% endblock %}

{% block content %}
<div class="container mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Add Version to {{ technology.name }}</h1>
        <a href="{{ url_for('technologies_show', id=technology.id) }}" class="text-blue-500 hover:text-blue-600">← Back to Technology</a>
    </div>

    <form method="POST" class="bg-white rounded-lg shadow-md p-6">
        <div class="mb-4">
            <label for="version" class="block text-sm font-medium text-gray-700 mb-2">Version Number</label>
            <input type="text" name="version" id="version" required placeholder="e.g. 1.0.0"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-4">
            <label for="release_date" class="block text-sm font-medium text-gray-700 mb-2">Release Date</label>
            <input type="date" name="release_date" id="release_date"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-4">
            <label for="end_of_life_date" class="block text-sm font-medium text-gray-700 mb-2">End of Life Date</label>
            <input type="date" name="end_of_life_date" id="end_of_life_date"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-4">
            <label class="flex items-center">
                <input type="checkbox" name="is_default" class="form-checkbox h-4 w-4 text-blue-500">
                <span class="ml-2 text-sm text-gray-700">Set as default version</span>
            </label>
        </div>

        <div class="flex justify-end">
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded">
                Add Version
            </button>
        </div>
    </form>
</div>
{% endblock %}
