{% extends 'layouts/base.html' %}

{% block title %}New Idea - Idea Management{% endblock %}

{% block content %}
<div class="container mx-auto max-w-2xl">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">New Idea</h1>
        
        <form method="POST" action="{{ url_for('ideas_create') }}" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" name="name" id="name" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea name="description" id="description" rows="4" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"></textarea>
            </div>

            <div>
                <label for="tech_stack" class="block text-sm font-medium text-gray-700">Tech Stacks</label>
                <select name="tech_stack" id="tech_stack" multiple
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    {% for tech in tech_stacks %}
                    <option value="{{ tech.id }}">{{ tech.name }}</option>
                    {% endfor %}
                </select>
                <p class="mt-1 text-sm text-gray-500">Hold Ctrl/Cmd to select multiple tech stacks</p>
            </div>

            <div class="flex justify-end space-x-4">
                <a href="{{ url_for('ideas') }}" 
                    class="bg-gray-100 text-gray-700 hover:bg-gray-200 px-4 py-2 rounded">
                    Cancel
                </a>
                <button type="submit" 
                    class="bg-blue-500 text-white hover:bg-blue-600 px-4 py-2 rounded">
                    Create Idea
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
