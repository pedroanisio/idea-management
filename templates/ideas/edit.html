{% extends 'layouts/base.html' %}

{% block title %}Edit {{ idea.title }} - Idea Management{% endblock %}

{% block content %}
<div class="container mx-auto max-w-2xl">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Edit Idea</h1>
        
        <form method="POST" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700">Title</label>
                <input type="text" name="title" id="title" value="{{ idea.title }}" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea name="description" id="description" rows="4" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">{{ idea.description }}</textarea>
            </div>

            <div>
                <label for="tech_stack" class="block text-sm font-medium text-gray-700">Tech Stack</label>
                <select name="tech_stack" id="tech_stack" multiple
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    {% for tech in technologies %}
                    <option value="{{ tech.id }}" {% if tech in idea.tech_stack %}selected{% endif %}>
                        {{ tech.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex justify-end space-x-4">
                <a href="{{ url_for('ideas_show', id=idea.id) }}" 
                    class="bg-gray-100 text-gray-700 hover:bg-gray-200 px-4 py-2 rounded">
                    Cancel
                </a>
                <button type="submit" 
                    class="bg-blue-500 text-white hover:bg-blue-600 px-4 py-2 rounded">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
