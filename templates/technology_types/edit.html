{% extends 'layouts/base.html' %}

{% block title %}Edit Technology Type - Idea Management{% endblock %}

{% block content %}
<div class="container mx-auto max-w-2xl">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Edit Technology Type</h1>
        
        <form method="POST" action="{{ url_for('technology_types_edit', id=type.id) }}" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" name="name" id="name" value="{{ type.name }}" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea name="description" id="description" rows="4"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">{{ type.description }}</textarea>
            </div>

            <div class="flex justify-end space-x-4">
                <a href="{{ url_for('technology_types_show', id=type.id) }}" 
                    class="bg-gray-100 text-gray-700 hover:bg-gray-200 px-4 py-2 rounded">
                    Cancel
                </a>
                <button type="submit" 
                    class="bg-purple-500 text-white hover:bg-purple-600 px-4 py-2 rounded">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
