{% macro standard_card(title='', classes='') %}
<div class="bg-cognitive-white border border-interface-divider rounded-lg shadow-sm overflow-hidden {{ classes }}">
  {% if title %}
  <div class="px-4 py-3 border-b border-interface-divider">
    <h3 class="text-lg font-medium text-data-text">{{ title }}</h3>
  </div>
  {% endif %}
  <div class="p-4">
    {{ caller() }}
  </div>
</div>
{% endmacro %}

{% macro feature_card(title='', icon='', classes='') %}
<div class="bg-algorithm-gray rounded-lg overflow-hidden transition-all hover:shadow-md {{ classes }}">
  <div class="p-5">
    {% if icon %}
    <div class="w-10 h-10 rounded-full bg-intelligence-purple/10 flex items-center justify-center mb-4">
      <i class="{{ icon }} text-intelligence-purple"></i>
    </div>
    {% endif %}
    {% if title %}
    <h3 class="text-lg font-medium text-data-text mb-2">{{ title }}</h3>
    {% endif %}
    {{ caller() }}
  </div>
</div>
{% endmacro %}
